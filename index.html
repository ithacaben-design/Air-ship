<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airship Afternoon</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: #1a1c1a; 
            font-family: 'Lora', serif; 
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* The 300-second Slow Drift Background */
        .sky-parallax {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .scroller {
            display: flex;
            width: 200%;
            height: 100%;
            animation: slow-drift 300s linear infinite;
        }

        .scroller img {
            width: 50%;
            height: 100%;
            object-fit: cover;
        }

        .mirrored { transform: scaleX(-1); }

        @keyframes slow-drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            pointer-events: none; /* Let clicks pass to UI if needed, or handle in JS */
        }

        /* UI OVERLAYS */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto;
            color: #f4efeb;
            text-align: center;
        }

        .hidden { display: none; }

        h1 { font-family: 'Caveat', cursive; font-size: clamp(3rem, 10vw, 5rem); color: #fdf5e6; }
        
        .btn {
            background: #8c7a6b;
            border: 2px solid #5c4b3a;
            color: #f4efeb;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-family: 'Lora', serif;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }

        #hud {
            position: absolute;
            top: 20px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Parallax Background Layer -->
    <div class="sky-parallax">
        <div class="scroller">
            <img src="background.jpg" alt="Mountains">
            <img src="background.jpg" class="mirrored" alt="Mountains">
        </div>
    </div>

    <!-- Gameplay Layer -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div id="hud" class="hidden">
            <div>SCORE: <span id="score">0</span></div>
            <div>PILOT: <span id="pilotName">Captain</span></div>
        </div>

        <div id="start-screen" class="screen">
            <h1>Airship Afternoon</h1>
            <input type="text" id="nameInput" placeholder="Enter Pilot Name" style="padding: 10px; border-radius: 5px; border: none; font-size: 1.2rem; width: 250px;">
            <button class="btn" onclick="startGame()">Untie & Launch</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let shipImg = new Image();
    shipImg.src = 'airship.jpg'; // Using the black background version

    let gameState = 'menu';
    let player = {
        x: 100,
        y: 200,
        vy: 0,
        width: 120, // "Half-dollar" relative size
        height: 80,
        gravity: 0.15,
        lift: -0.4,
        isLifting: false
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Adjust ship size based on screen
        player.width = Math.min(canvas.width * 0.15, 120);
        player.height = player.width * 0.66;
    }
    window.addEventListener('resize', resize);
    resize();

    function startGame() {
        const name = document.getElementById('nameInput').value;
        document.getElementById('pilotName').innerText = name || "Captain";
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        gameState = 'play';
        requestAnimationFrame(update);
    }

    // Input Handling
    window.addEventListener('mousedown', () => player.isLifting = true);
    window.addEventListener('mouseup', () => player.isLifting = false);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); player.isLifting = true; });
    window.addEventListener('touchend', () => player.isLifting = false);

    function update() {
        if (gameState !== 'play') return;

        // Physics
        if (player.isLifting) {
            player.vy += player.lift;
        } else {
            player.vy += player.gravity;
        }
        player.y += player.vy;
        player.vy *= 0.98; // Friction

        // Bounds
        if (player.y < 0) { player.y = 0; player.vy = 0; }
        if (player.y > canvas.height - player.height) { player.y = canvas.height - player.height; player.vy = 0; }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Drawing the Airship with "Black-Key" transparency trick
        // We use globalCompositeOperation to 'screen' or use a custom filter
        ctx.save();
        
        // This filter attempts to make strictly black pixels transparent in real-time
        // If your ship art is too dark, we can remove this and use a proper PNG
        ctx.globalCompositeOperation = 'screen'; 
        
        // Draw Squirrel Pilot & Woodpecker Ship
        ctx.drawImage(shipImg, player.x, player.y, player.width, player.height);
        
        ctx.restore();
    }

</script>
</body>
</html>
