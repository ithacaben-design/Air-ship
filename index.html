<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air-ship Sim Mobile</title>
    <style>
        /* RESET & MOBILE FIXES */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* Prevents bouncing on mobile */
            background-color: #000;
        }

        /* DYNAMIC BACKGROUND PHOTO */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Using your specific GitHub filename */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                              url('PXL_20231005_222618446.PORTRAIT-01.COVER.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Courier New', monospace;
            color: #00ffcc;
        }

        /* MOBILE HUD */
        #hud {
            padding: 15px;
            background: rgba(0, 20, 20, 0.9);
            border-bottom: 2px solid #00ffcc;
            font-size: 12px;
            z-index: 10;
        }

        /* THE GAME STAGE */
        #stage {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #flight-group {
            display: flex;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #ship-img {
            width: 75vw; /* Sized for mobile screens */
            max-width: 500px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
            animation: vibrate 0.2s infinite alternate;
        }

        /* THE BANNER */
        #banner {
            position: absolute;
            right: 80%;
            background: #ffd700;
            color: #000;
            width: 0; height: 0;
            overflow: hidden;
            transition: 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
        }

        .banner-active { width: 140px !important; height: 40px !important; padding: 5px; border: 1px solid #fff; }

        /* MOBILE TOUCH CONTROLS */
        #controls {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(0,0,0,0.8);
        }

        .btn {
            background: #111;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 15px;
            font-size: 14px;
            text-transform: uppercase;
            border-radius: 8px;
            text-align: center;
        }

        .btn:active { background: #00ffcc; color: #000; }
        .btn-on { background: #004444; border-width: 2px; }

        @keyframes vibrate {
            from { transform: translateY(0); }
            to { transform: translateY(2px); }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div id="hud">
        ALT: <span id="alt">1200</span> | 
        POS: <span id="pos">CNTR</span> | 
        CARGO: <span id="cargo">OFF</span>
    </div>

    <div id="stage">
        <div id="flight-group">
            <div id="banner">AIRSHIP_SIM</div>
            <img src="1774454560922.png" id="ship-img" alt="Ship">
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="act('lift')">Lift</button>
        <button class="btn" onclick="act('kite')">Kites</button>
        <button class="btn" style="grid-column: span 2" onclick="act('banner')">Deploy Banner</button>
    </div>

    <script>
        let state = { lift: false, kite: false, banner: false };

        function act(type) {
            state[type] = !state[type];
            const group = document.getElementById('flight-group');
            const banner = document.getElementById('banner');
            
            // Toggle Visuals
            let x = state.kite ? "15vw" : "0";
            let y = state.lift ? "-80px" : "0";
            group.style.transform = `translate(${x}, ${y})`;

            // Banner Logic
            if (state.banner) {
                banner.classList.add('banner-active');
                document.getElementById('cargo').innerText = "DEPLOYED";
            } else {
                banner.classList.remove('banner-active');
                document.getElementById('cargo').innerText = "OFF";
            }

            // HUD Updates
            document.getElementById('alt').innerText = state.lift ? "2400" : "1200";
            document.getElementById('pos').innerText = state.kite ? "RIGHT" : "CNTR";
            
            // Button feedback
            event.target.classList.toggle('btn-on');
        }
    </script>
</body>
</html>
