<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acorn Aviator - Custom Bouquet</title>
  
  <style>
    body, html {
      margin: 0; padding: 0; width: 100vw; height: 100vh;
      overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; 
    }
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
    
    @keyframes driftBehind {
      from { opacity: 0; transform: translate(-20px, 5px) scale(0.9); }
      to { opacity: 1; transform: translate(0, 0) scale(1); }
    }

    @keyframes sway {
      0% { transform: rotate(-3deg) translateX(-10px); }
      50% { transform: rotate(3deg) translateX(10px); }
      100% { transform: rotate(-3deg) translateX(-10px); }
    }

    .sway-effect { animation: sway 4s ease-in-out infinite; }

    .control-btn {
      padding: 20px; font-size: 1.1rem; color: white; border: none;
      border-radius: 15px; cursor: pointer; font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s;
    }
    .control-btn:active { transform: scale(0.95); }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const BANNER_MESSAGES = [
      "I love you, {name}.",
      "I see all the hard work you're doing, {name}.",
      "I'm grateful to you for being so good, {name}.",
      "Everyone is doing their best and their best is good enough, {name}."
    ];

    function App() {
      const [gameState, setGameState] = useState('start'); 
      const [playerName, setPlayerName] = useState('');
      const [emojiInput, setEmojiInput] = useState('🎈💖🌈✨🌸🍄'); // Default bouquet
      
      const [altitude, setAltitude] = useState(50);
      const [speed, setSpeed] = useState(5);
      const [balloons, setBalloons] = useState([]);
      const [kites, setKites] = useState([]);
      const [banners, setBanners] = useState([]);
      const [smokeSignals, setSmokeSignals] = useState([]);
      const [isLanding, setIsLanding] = useState(false);
      const [score, setScore] = useState(0);

      const gameLoopRef = useRef();

      const bgImageUrl = "https://raw.githubusercontent.com/ithacaben-design/Air-ship/main/PXL_20231005_222618446.PORTRAIT-PANO.jpg";
      const shipImageUrl = "https://raw.githubusercontent.com/ithacaben-design/Air-ship/main/1774449907604.png";

      const startGame = () => {
        setAltitude(50); setSpeed(5); setScore(0);
        setBalloons([]); setKites([]); setBanners([]); setSmokeSignals([]);
        setIsLanding(false); setGameState('playing');
      };

      const dropAll = () => { setBalloons([]); setKites([]); setBanners([]); };

      useEffect(() => {
        if (banners.length === 4 && smokeSignals.length === 0 && !isLanding) {
          setTimeout(() => setSmokeSignals(prev => [...prev, { id: 's1', text: "I miss you." }]), 2000); 
          setTimeout(() => setSmokeSignals(prev => [...prev, { id: 's2', text: "I'll see you soon." }]), 5000); 
          setTimeout(() => setIsLanding(true), 8000);
        }
      }, [banners.length, smokeSignals.length, isLanding]);

      useEffect(() => {
        if (gameState !== 'playing') return;
        const loop = () => {
          setAltitude((prev) => {
            let newAlt;
            if (isLanding) { newAlt = prev - 0.12; } 
            else {
              const lift = balloons.length * 0.65; 
              const gravity = 0.75; 
              newAlt = prev + (lift - gravity);
            }
            if (newAlt > 92) newAlt = 92;
            if (newAlt <= 0) { setGameState(isLanding ? 'start' : 'gameover'); return 0; }
            return newAlt;
          });

          setSpeed((prev) => {
            if (isLanding) return Math.max(1, prev - 0.03); 
            const propulsion = kites.length * 2.0;
            const drag = banners.length * 1.3;
            return Math.max(1, 4 + propulsion - drag); 
          });

          setScore((prev) => prev + speed * 0.015);
          gameLoopRef.current = requestAnimationFrame(loop);
        };
        gameLoopRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(gameLoopRef.current);
      }, [gameState, balloons.length, kites.length, banners.length, speed, isLanding]);

      const deployBalloon = () => {
        // Split input into array (handles multi-character emojis)
        const pool = Array.from(emojiInput.length > 0 ? emojiInput : "🎈");
        const randomEmoji = pool[Math.floor(Math.random() * pool.length)];
        setBalloons([...balloons, { id: Date.now(), emoji: randomEmoji }]);
      };
      
      const deployKite = () => setKites([...kites, { id: Date.now() }]);
      const deployBanner = () => {
        if (banners.length < BANNER_MESSAGES.length) {
          const msg = BANNER_MESSAGES[banners.length].replace('{name}', playerName || 'my friend');
          setBanners([...banners, { id: Date.now(), text: msg }]);
        }
      };

      return (
        <div style={{ 
          width: '100vw', height: '100vh', overflow: 'hidden', position: 'relative', 
          backgroundImage: `url(${bgImageUrl})`, backgroundSize: 'auto 100%', 
          backgroundRepeat: 'repeat-x', backgroundPosition: `-${score * 35}px center`, 
          transition: 'background-position 0.1s linear'
        }}>
          
          {gameState === 'start' && (
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', backgroundColor: 'rgba(255,255,255,0.85)', zIndex: 100 }}>
              <h1 style={{ fontSize: '3.5rem', fontFamily: "'Permanent Marker', cursive", color: '#333' }}>Acorn Aviator</h1>
              <input type="text" placeholder="Your Name" value={playerName} onChange={(e) => setPlayerName(e.target.value)} style={{ padding: '12px', fontSize: '1.2rem', marginBottom: '15px', borderRadius: '8px', textAlign: 'center', border: '2px solid #ccc', width: '250px' }} />
              
              <div style={{textAlign: 'center', marginBottom: '25px'}}>
                <p style={{margin: '5px 0', fontWeight: 'bold'}}>Enter Your Balloon Emojis:</p>
                <input type="text" value={emojiInput} onChange={(e) => setEmojiInput(e.target.value)} style={{ padding: '10px', fontSize: '1.5rem', width: '300px', textAlign: 'center', borderRadius: '8px', border: '2px solid #ccc' }} />
                <p style={{fontSize: '0.8rem', color: '#666'}}>(Type any emojis you want in your bouquet!)</p>
              </div>

              <button onClick={startGame} style={{ padding: '15px 50px', fontSize: '1.6rem', backgroundColor: '#4CAF50', color: 'white', border: 'none', borderRadius: '15px', cursor: 'pointer' }}>Start Flight</button>
            </div>
          )}

          {gameState === 'playing' && (
            <div className={balloons.length === 0 ? "sway-effect" : ""} style={{ position: 'absolute', left: '35%', bottom: `${altitude}%`, display: 'flex', flexDirection: 'column', alignItems: 'center', transition: 'bottom 0.2s linear' }}>
              
              {/* CUSTOM EMOJI BALLOON CLUSTER */}
              {balloons.length > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column-reverse', alignItems: 'center', marginBottom: '-15px' }}>
                  <div style={{ width: '2px', height: '50px', backgroundColor: 'rgba(255,255,255,0.4)' }}></div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', width: '140px', justifyContent: 'center', gap: '2px', fontSize: '2rem' }}>
                    {balloons.map((b) => <span key={b.id}>{b.emoji}</span>)}
                  </div>
                </div>
              )}

              <div style={{ display: 'flex', alignItems: 'center', position: 'relative' }}>
                <div style={{ position: 'absolute', right: '130%', bottom: '40px', display: 'flex', flexDirection: 'column', gap: '15px', alignItems: 'flex-end' }}>
                  {smokeSignals.map((s) => (
                    <div key={s.id} style={{ backgroundColor: 'white', padding: '12px 20px', borderRadius: '25px', fontSize: '1.3rem', color: '#444', fontFamily: "'Permanent Marker', cursive", boxShadow: '0 5px 15px rgba(0,0,0,0.2)', animation: 'driftBehind 2s forwards' }}>{s.text}</div>
                  ))}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', marginRight: '20px', alignItems: 'flex-end' }}>
                  {banners.map((b) => (
                    <div key={b.id} style={{ backgroundColor: '#FFF9E6', border: '1px solid #E2C792', padding: '10px 18px', borderRadius: '4px 15px 15px 4px', fontSize: '1.2rem', color: '#000', fontFamily: "'Permanent Marker', cursive", boxShadow: '3px 3px 6px rgba(0,0,0,0.2)' }}>{b.text}</div>
                  ))}
                </div>

                <img src={shipImageUrl} style={{ height: '140px', zIndex: 20, filter: 'drop-shadow(2px 5px 8px rgba(0,0,0,0.4))' }} />

                {kites.length > 0 && (
                  <div style={{ display: 'flex', alignItems: 'center', marginLeft: '-15px' }}>
                    <div style={{ width: '50px', height: '2px', backgroundColor: 'rgba(255,255,255,0.4)' }}></div>
                    <div style={{ display: 'flex', gap: '5px', fontSize: '2.5rem' }}>{kites.map((k) => <span key={k.id}>🪁</span>)}</div>
                  </div>
                )}
              </div>
            </div>
          )}

          {gameState === 'playing' && (
            <div style={{ position: 'absolute', bottom: 50, left: 0, right: 0, display: 'flex', justifyContent: 'center', gap: '20px', opacity: isLanding ? 0 : 1, transition: 'opacity 1s' }}>
              <button onClick={deployBanner} disabled={banners.length >= 4} className="control-btn" style={{ backgroundColor: '#FF6B6B' }}>Banner 🎏</button>
              <button onClick={dropAll} className="control-btn" style={{ backgroundColor: '#444', borderRadius: '50%', width: '75px', height: '75px', fontSize: '1.8rem', padding: 0 }}>✂️</button>
              <button onClick={deployBalloon} className="control-btn" style={{ backgroundColor: '#4ECDC4' }}>Balloon Bouquet 🎈</button>
              <button onClick={deployKite} className="control-btn" style={{ backgroundColor: '#FFE66D', color: '#333' }}>Kite 🪁</button>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
