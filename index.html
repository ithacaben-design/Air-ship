<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air-ship Simulator</title>
    <style>
        /* Base Setup */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* The Air-ship */
        h1 {
            position: absolute;
            top: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .art-container {
            width: 100%;
            display: flex;
            justify-content: center;
            animation: float 6s ease-in-out infinite;
        }

        img {
            width: 85vw; 
            max-width: 900px;
            filter: drop-shadow(0 20px 40px rgba(255, 255, 255, 0.1));
        }

        /* --- THE THEMED BUTTONS --- */
        .nav-menu {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 25px;
        }

        .sim-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-decoration: none;
        }

        /* 1. Balloon Style (Rounded) */
        .btn-balloon { border-radius: 50px; }
        .btn-balloon:hover { 
            background: rgba(255, 100, 100, 0.2); 
            transform: translateY(-10px); /* Lifts up like a balloon */
        }

        /* 2. Kite Style (Diamond-ish) */
        .btn-kite { transform: skewX(-10deg); }
        .btn-kite:hover { 
            transform: skewX(-10deg) rotate(5deg);
            background: rgba(100, 200, 255, 0.2);
        }

        /* 3. Banner Style (Hanging) */
        .btn-banner { border-bottom: 3px solid rgba(255, 255, 255, 0.3); }
        .btn-banner:hover {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-color: #ffcc00; /* Gold "Banner" trim */
        }

        /* Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .nav-menu { flex-direction: column; bottom: 30px; gap: 10px; }
            .sim-btn { width: 150px; text-align: center; }
        }
    </style>
</head>
<body>

    <h1>Air-ship</h1>

    <div class="art-container">
        <img src="1774454560922.png" alt="Air-ship Illustration">
    </div>

    <!-- Themed Interface -->
    <div class="nav-menu">
        <a href="#" class="sim-btn btn-balloon">Balloons</a>
        <a href="#" class="sim-btn btn-kite">Kites</a>
        <a href="#" class="sim-btn btn-banner">Banners</a>
    </div>

</body>
</html>
