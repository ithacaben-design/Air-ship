<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Acorn Aviator - Professional Asset Edition</title>
  
  <style>
    body, html {
      margin: 0; padding: 0; width: 100vw; height: 100vh;
      overflow: hidden; font-family: sans-serif; background-color: #87CEEB; 
      overscroll-behavior: none;
    }
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
    
    @keyframes sway {
      0% { transform: rotate(-2deg) translateY(-5px); }
      50% { transform: rotate(2deg) translateY(5px); }
      100% { transform: rotate(-2deg) translateY(-5px); }
    }

    @keyframes groundedShake {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(1px, -1px) rotate(0.5deg); }
      75% { transform: translate(-1px, 1px) rotate(-0.5deg); }
    }

    .ship-rendering {
      height: 120px;
      z-index: 20;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }

    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 110px; background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      display: flex; align-items: center; padding: 0 15px; gap: 10px;
      z-index: 1000; border-top: 1px solid rgba(255,255,255,0.2);
    }

    .control-btn {
      flex: 1; height: 80px; font-size: 1rem; color: white;
      border: none; border-radius: 18px; cursor: pointer;
      font-weight: bold; box-shadow: 0 6px 0px rgba(0,0,0,0.3);
      transition: transform 0.05s; display: flex; flex-direction: column;
      align-items: center; justify-content: center; touch-action: manipulation;
    }

    .control-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.3); }

    .emoji-picker-btn {
      font-size: 2.2rem; background: white; border: 4px solid #f0f0f0;
      border-radius: 18px; padding: 15px; margin: 8px; cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s;
    }
    .emoji-picker-btn.selected { border-color: #4CAF50; transform: scale(1.15); background: #e8f5e9; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ALL_EMOJIS = ["❤️", "👄", "🍆", "🍑"];
    const BANNER_MESSAGES = ["I love you, {name}.", "Keep going, {name}.", "Grateful for you, {name}.", "You've got this, {name}."];

    function App() {
      const [gameState, setGameState] = useState('start');
      const [playerName, setPlayerName] = useState('');
      const [selectedEmojis, setSelectedEmojis] = useState(["❤️", "👄", "🍑"]);
      const [altitude, setAltitude] = useState(5);
      const [shipX, setShipX] = useState(25);
      const [balloons, setBalloons] = useState([]);
      const [kites, setKites] = useState([]);
      const [banners, setBanners] = useState([]);
      const [score, setScore] = useState(0);

      const shipImageUrl = "https://raw.githubusercontent.com/ithacaben-design/Air-ship/main/1774449907604.png";
      const bgImageUrl = "https://raw.githubusercontent.com/ithacaben-design/Air-ship/main/PXL_20231005_222618446.PORTRAIT-PANO.jpg";

      const startGame = () => {
        if (selectedEmojis.length < 3) return;
        setAltitude(25);
        setShipX(25);
        setScore(0);
        setKites([]); setBanners([]);
        // Start with 1 of each balloon as requested
        setBalloons(selectedEmojis.map((e, i) => ({ id: Date.now() + i, emoji: e })));
        setGameState('playing');
      };

      useEffect(() => {
        if (gameState !== 'playing') return;
        const loop = setInterval(() => {
          setAltitude(a => {
            const lift = balloons.length * 0.9;
            const gravity = 1.3; // Heavier gravity for better "Cut" feel
            const next = a + (lift - gravity);
            if (next <= 0) { setGameState('gameover'); return 0; }
            return Math.min(next, 85);
          });

          setShipX(x => {
            const pull = kites.length * 3.5; 
            const drag = banners.length * 4.0; 
            return Math.max(5, Math.min(80, 25 + pull - drag));
          });

          setScore(s => s + 0.1);
        }, 30);
        return () => clearInterval(loop);
      }, [gameState, balloons.length, kites.length, banners.length]);

      return (
        <div style={{ 
          width: '100vw', height: '100vh', backgroundImage: `url(${bgImageUrl})`, 
          backgroundSize: 'auto 100%', backgroundPosition: `-${score * 10}px center`,
          transition: 'background-position 0.1s linear'
        }}>
          
          {gameState === 'start' && (
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'rgba(255,255,255,0.95)' }}>
              <div style={{ position: 'relative', height: '180px', animation: 'groundedShake 4s infinite' }}>
                <div style={{ position: 'absolute', width: '2px', height: '60px', background: '#333', bottom: '-5px', left: '130px', transform: 'rotate(25deg)', opacity: 0.6 }}></div>
                <div style={{ position: 'absolute', width: '2px', height: '60px', background: '#333', bottom: '-5px', left: '170px', transform: 'rotate(-25deg)', opacity: 0.6 }}></div>
                <img src={shipImageUrl} className="ship-rendering" style={{ position: 'relative' }} />
              </div>
              <h1 style={{ fontFamily: "'Permanent Marker', cursive", fontSize: '2.5rem', margin: '10px 0' }}>Acorn Aviator</h1>
              <input type="text" placeholder="Pilot Name" value={playerName} onChange={e => setPlayerName(e.target.value)} style={{ padding: '15px', borderRadius: '12px', border: '2px solid #ddd', textAlign: 'center', width: '250px', fontSize: '1.1rem' }} />
              <div style={{ margin: '20px 0' }}>
                {ALL_EMOJIS.map(e => (
                  <button key={e} onClick={() => {
                    if (selectedEmojis.includes(e)) setSelectedEmojis(prev => prev.filter(x => x !== e));
                    else if (selectedEmojis.length < 3) setSelectedEmojis(prev => [...prev, e]);
                  }} className={`emoji-picker-btn ${selectedEmojis.includes(e) ? 'selected' : ''}`}>{e}</button>
                ))}
              </div>
              <button onClick={startGame} disabled={selectedEmojis.length < 3} style={{ padding: '18px 60px', background: '#4CAF50', color: 'white', border: 'none', borderRadius: '20px', fontSize: '1.4rem', fontWeight: 'bold' }}>Untie & Fly!</button>
            </div>
          )}

          {gameState === 'playing' && (
            <div style={{ position: 'absolute', left: `${shipX}%`, bottom: `${altitude}%`, display: 'flex', alignItems: 'center', transition: 'left 0.5s ease-out, bottom 0.2s linear' }}>
              
              {/* Dragging Left */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginRight: '20px', alignItems: 'flex-end' }}>
                {banners.map(b => (
                    <div key={b.id} style={{ background: '#FFF9E6', border: '1px solid #E2C792', padding: '10px 15px', borderRadius: '5px 15px 15px 5px', fontFamily: "'Permanent Marker', cursive", fontSize: '0.9rem', whiteSpace: 'nowrap' }}>
                        {b.text}
                    </div>
                ))}
              </div>

              <div style={{ position: 'relative' }}>
                <img src={shipImageUrl} className="ship-rendering" style={{ animation: 'sway 4s infinite ease-in-out' }} />
                
                {/* Vertical Balloon Strip - Now with actual tether line */}
                <div style={{ position: 'absolute', top: '95px', left: '50%', transform: 'translateX(-50%)', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <div style={{ width: '2px', background: 'rgba(255,255,255,0.7)', height: `${balloons.length * 28}px`, transition: 'height 0.3s' }}></div>
                    <div style={{ display: 'flex', flexDirection: 'column-reverse', marginTop: '-5px' }}>
                        {balloons.map(b => <span key={b.id} style={{ fontSize: '2rem', marginTop: '-15px', textShadow: '0 4px 6px rgba(0,0,0,0.2)' }}>{b.emoji}</span>)}
                    </div>
                </div>
              </div>

              {/* Pulling Right */}
              {kites.length > 0 && (
                <div style={{ display: 'flex', alignItems: 'center', marginLeft: '-15px' }}>
                  <div style={{ width: '50px', height: '2px', background: 'rgba(255,255,255,0.6)' }}></div>
                  <div style={{ display: 'flex', gap: '5px' }}>
                    {kites.map(k => <span key={k.id} style={{ fontSize: '2.2rem' }}>🪁</span>)}
                  </div>
                </div>
              )}
            </div>
          )}

          {gameState === 'playing' && (
            <div className="nav-bar">
              <button onClick={() => {
                if (banners.length < 4) setBanners([...banners, { id: Math.random(), text: BANNER_MESSAGES[banners.length].replace('{name}', playerName || 'Pilot') }]);
              }} className="control-btn" style={{ background: '#FF6B6B' }}>Banner 🎏</button>
              
              <button onClick={() => { setBalloons([]); setKites([]); setBanners([]); }} className="control-btn" style={{ background: '#444', flex: '0 0 80px', borderRadius: '50%', fontSize: '1.8rem' }}>✂️</button>
              
              <button onClick={() => setBalloons([...balloons, { id: Math.random(), emoji: selectedEmojis[Math.floor(Math.random() * 3)] }])} className="control-btn" style={{ background: '#4ECDC4' }}>Bouquet 🎈</button>
              
              <button onClick={() => setKites([...kites, { id: Math.random() }])} className="control-btn" style={{ background: '#FFE66D', color: '#333' }}>Kite 🪁</button>
            </div>
          )}

          {gameState === 'gameover' && (
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.85)', color: 'white' }}>
              <h2 style={{ fontFamily: "'Permanent Marker', cursive", fontSize: '3rem' }}>Landed!</h2>
              <button onClick={() => setGameState('start')} style={{ padding: '20px 60px', background: '#4CAF50', color: 'white', border: 'none', borderRadius: '20px', fontSize: '1.3rem' }}>Fly Again</button>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
