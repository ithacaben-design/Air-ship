<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air-ship Sim v1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Photo from your GitHub repo */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('PXL_20231005_222618446.PORTRAIT-01.COVER.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #111;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Tech/Sim feel */
            color: #00ffcc; /* Cockpit Green */
        }

        /* --- HUD / COCKPIT DISPLAY --- */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 40, 40, 0.6);
            padding: 15px;
            border-left: 3px solid #00ffcc;
            backdrop-filter: blur(5px);
            font-size: 0.8rem;
            line-height: 1.6;
            z-index: 100;
        }

        .stat-val { color: #fff; font-weight: bold; }

        /* --- AIR-SHIP CONTAINER --- */
        .art-container {
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 2s ease-in-out; /* Smooth movement for gameplay */
            z-index: 2;
        }

        #ship-img {
            width: 80vw; 
            max-width: 850px;
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.7));
            transition: transform 1s ease-in-out;
        }

        /* --- CONTROLS --- */
        .nav-menu {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .sim-btn {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 12px 24px;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .sim-btn:hover { background: #00ffcc; color: #000; }
        .active-btn { background: #00ffcc !important; color: #000 !important; box-shadow: 0 0 15px #00ffcc; }

        /* Animations */
        @keyframes engine-vibe {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(1px, 2px); }
        }

        .engine-on { animation: engine-vibe 0.1s infinite; }

        @media (max-width: 600px) {
            .nav-menu { flex-direction: column; bottom: 20px; }
            #hud { top: auto; bottom: 250px; left: 10px; right: 10px; }
        }
    </style>
</head>
<body>

    <div id="hud">
        SYSTEM: <span class="stat-val">ACTIVE</span><br>
        ALTITUDE: <span id="alt-val" class="stat-val">1250</span> FT<br>
        AIRSPEED: <span id="speed-val" class="stat-val">12</span> KTS<br>
        STABILITY: <span id="stab-val" class="stat-val">98</span>%
    </div>

    <div class="art-container" id="flight-box">
        <img src="1774454560922.png" alt="Air-ship" id="ship-img" class="engine-on">
    </div>

    <div class="nav-menu">
        <button class="sim-btn" onclick="toggleLift(this)">Balloons</button>
        <button class="sim-btn" onclick="toggleKite(this)">Kites</button>
        <button class="sim-btn" onclick="deployBanner(this)">Banners</button>
    </div>

    <script>
        let alt = 1250;
        let speed = 12;
        let stable = 98;

        function updateHUD() {
            document.getElementById('alt-val').innerText = alt;
            document.getElementById('speed-val').innerText = speed;
            document.getElementById('stab-val').innerText = stable;
        }

        function toggleLift(btn) {
            btn.classList.toggle('active-btn');
            const isRaising = btn.classList.contains('active-btn');
            alt = isRaising ? alt + 500 : alt - 500;
            document.getElementById('flight-box').style.transform = `translateY(${isRaising ? '-100px' : '0px'})`;
            updateHUD();
        }

        function toggleKite(btn) {
            btn.classList.toggle('active-btn');
            const isEngaged = btn.classList.contains('active-btn');
            speed = isEngaged ? speed + 15 : speed - 15;
            document.getElementById('ship-img').style.transform = `rotate(${isEngaged ? '-5deg' : '0deg'})`;
            updateHUD();
        }

        function deployBanner(btn) {
            btn.classList.toggle('active-btn');
            stable = btn.classList.contains('active-btn') ? stable - 5 : stable + 5;
            updateHUD();
            alert(btn.classList.contains('active-btn') ? "BANNER DEPLOYED" : "BANNER RETRACTED");
        }

        // Ambient drift
        setInterval(() => {
            alt += Math.floor(Math.random() * 3) - 1;
            updateHUD();
        }, 3000);
    </script>
</body>
</html>
