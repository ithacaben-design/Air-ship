<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acorn Aviator - Gentle Drift</title>
  
  <style>
    body, html {
      margin: 0; padding: 0; width: 100vw; height: 100vh;
      overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; 
    }
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
    
    @keyframes driftBehind {
      from { opacity: 0; transform: translate(-20px, 5px) scale(0.9); }
      to { opacity: 1; transform: translate(0, 0) scale(1); }
    }

    /* Swaying animation for a slow fall */
    @keyframes sway {
      0% { transform: rotate(-2deg) translateX(-5px); }
      50% { transform: rotate(2deg) translateX(5px); }
      100% { transform: rotate(-2deg) translateX(-5px); }
    }

    .sway-effect {
      animation: sway 3s ease-in-out infinite;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const BANNER_MESSAGES = [
      "I love you, {name}.",
      "I see all the hard work you're doing, {name}.",
      "I'm grateful to you for being so good, {name}.",
      "Everyone is doing their best and their best is good enough, {name}."
    ];

    function App() {
      const [gameState, setGameState] = useState('start'); 
      const [playerName, setPlayerName] = useState('');
      const [balloonEmoji, setBalloonEmoji] = useState('🎈');
      
      const [altitude, setAltitude] = useState(50);
      const [speed, setSpeed] = useState(5);
      const [balloons, setBalloons] = useState([]);
      const [kites, setKites] = useState([]);
      const [banners, setBanners] = useState([]);
      const [smokeSignals, setSmokeSignals] = useState([]);
      const [isLanding, setIsLanding] = useState(false);
      const [score, setScore] = useState(0);

      const gameLoopRef = useRef();

      const bgImageUrl = "https://raw.githubusercontent.com/ithacaben-design/Air-ship/main/PXL_20231005_222618446.PORTRAIT-PANO.jpg";
      const shipImageUrl = "https://raw.githubusercontent.com/ithacaben-design/Air-ship/main/1774449907604.png";

      const startGame = () => {
        setAltitude(50); setSpeed(5); setScore(0);
        setBalloons([{ id: Date.now(), emoji: balloonEmoji }]); 
        setKites([]); setBanners([]); setSmokeSignals([]);
        setIsLanding(false); setGameState('playing');
      };

      const dropAll = () => {
        setBalloons([]);
        setKites([]);
        setBanners([]);
      };

      useEffect(() => {
        if (banners.length === 4 && smokeSignals.length === 0 && !isLanding) {
          setTimeout(() => setSmokeSignals(prev => [...prev, { id: 's1', text: "I miss you." }]), 2000); 
          setTimeout(() => setSmokeSignals(prev => [...prev, { id: 's2', text: "I'll see you soon." }]), 5000); 
          setTimeout(() => setIsLanding(true), 7000);
        }
      }, [banners.length, smokeSignals.length, isLanding]);

      useEffect(() => {
        if (gameState !== 'playing') return;
        const loop = () => {
          setAltitude((prev) => {
            let newAlt;
            if (isLanding) { 
              newAlt = prev - 0.15; // Slowed down final landing
            } 
            else {
              const lift = balloons.length * 0.7; // Tweak lift for finer control
              const gravity = 0.8; // REDUCED GRAVITY: Makes the ship fall slow
              newAlt = prev + (lift - gravity);
            }
            if (newAlt > 92) newAlt = 92;
            if (newAlt <= 0) { setGameState(isLanding ? 'start' : 'gameover'); return 0; }
            return newAlt;
          });

          setSpeed((prev) => {
            if (isLanding) return Math.max(1, prev - 0.03); 
            const propulsion = kites.length * 2.0;
            const drag = banners.length * 1.4;
            return Math.max(1, 4 + propulsion - drag); 
          });

          setScore((prev) => prev + speed * 0.015);
          gameLoopRef.current = requestAnimationFrame(loop);
        };
        gameLoopRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(gameLoopRef.current);
      }, [gameState, balloons.length, kites.length, banners.length, speed, isLanding]);

      const deployBalloon = () => setBalloons([...balloons, { id: Date.now(), emoji: balloonEmoji }]);
      const deployKite = () => setKites([...kites, { id: Date.now() }]);
      const deployBanner = () => {
        if (banners.length < BANNER_MESSAGES.length) {
          const msg = BANNER_MESSAGES[banners.length].replace('{name}', playerName || 'my friend');
          setBanners([...banners, { id: Date.now(), text: msg }]);
        }
      };

      return (
        <div style={{ 
          width: '100vw', height: '100vh', overflow: 'hidden', position: 'relative', 
          backgroundImage: `url(${bgImageUrl})`, backgroundSize: 'auto 100%', 
          backgroundRepeat: 'repeat-x', backgroundPosition: `-${score * 30}px center`, 
          transition: 'background-position 0.1s linear'
        }}>
          
          {gameState === 'start' && (
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', backgroundColor: 'rgba(255,255,255,0.85)', zIndex: 100 }}>
              <h1 style={{ fontSize: '3rem', fontFamily: "'Permanent Marker', cursive" }}>Acorn Aviator</h1>
              <input type="text" placeholder="Your Name" value={playerName} onChange={(e) => setPlayerName(e.target.value)} style={{ padding: '10px', fontSize: '1.2rem', marginBottom: '10px', borderRadius: '8px', textAlign: 'center' }} />
              <input type="text" value={balloonEmoji} onChange={(e) => setBalloonEmoji(e.target.value.substring(0, 2))} style={{ padding: '10px', fontSize: '2rem', width: '60px', textAlign: 'center', marginBottom: '20px' }} />
              <button onClick={startGame} style={{ padding: '15px 40px', fontSize: '1.5rem', backgroundColor: '#4CAF50', color: 'white', border: 'none', borderRadius: '12px', cursor: 'pointer' }}>Fly!</button>
            </div>
          )}

          {gameState === 'playing' && (
            <div className={balloons.length === 0 ? "sway-effect" : ""} style={{ position: 'absolute', left: '35%', bottom: `${altitude}%`, display: 'flex', flexDirection: 'column', alignItems: 'center', transition: 'bottom 0.2s linear' }}>
              
              {/* BALLOONS */}
              {balloons.length > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column-reverse', alignItems: 'center', marginBottom: '-10px' }}>
                  <div style={{ width: '2px', height: '40px', backgroundColor: 'rgba(255,255,255,0.5)' }}></div>
                  <div style={{ display: 'flex', gap: '5px', fontSize: '2.5rem' }}>
                    {balloons.map((b) => <span key={b.id}>{b.emoji}</span>)}
                  </div>
                </div>
              )}

              <div style={{ display: 'flex', alignItems: 'center', position: 'relative' }}>
                {/* SMOKE SIGNALS */}
                <div style={{ position: 'absolute', right: '120%', bottom: '60px', display: 'flex', flexDirection: 'column', gap: '10px', alignItems: 'flex-end' }}>
                  {smokeSignals.map((s) => (
                    <div key={s.id} style={{ backgroundColor: 'white', padding: '10px 15px', borderRadius: '20px', fontSize: '1.2rem', fontFamily: "'Permanent Marker', cursive", animation: 'driftBehind 1.5s forwards' }}>{s.text}</div>
                  ))}
                </div>

                {/* BANNERS */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginRight: '15px', alignItems: 'flex-end' }}>
                  {banners.map((b) => (
                    <div key={b.id} style={{ backgroundColor: '#FFF9E6', border: '1px solid #E2C792', padding: '8px 15px', borderRadius: '4px 12px 12px 4px', fontSize: '1.2rem', color: '#000', fontFamily: "'Permanent Marker', cursive", boxShadow: '2px 2px 5px rgba(0,0,0,0.2)' }}>
