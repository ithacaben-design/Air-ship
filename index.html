<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air-ship Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000; /* Deep black background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .art-container {
            width: 100%;
            display: flex;
            justify-content: center;
            /* Animation for a gentle floating effect */
            animation: float 6s ease-in-out infinite;
        }
        img {
            width: 90vw; 
            max-width: 1200px;
            height: auto;
            display: block;
            /* Soft shadow to give depth against the black */
            filter: drop-shadow(0 10px 20px rgba(255, 255, 255, 0.05));
        }
        h1 {
            position: absolute;
            top: 40px;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 200;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 1rem;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <h1>Air-ship</h1>

    <div class="art-container">
        <!-- Updated filename from your repository -->
        <img src="1774454560922.png" alt="Air-ship Illustration">
    </div>

</body>
</html>
