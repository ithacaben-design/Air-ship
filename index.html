<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air-ship Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000; /* Black background for a cinematic feel */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .art-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        img {
            width: 100vw; /* Fills 100% of the viewport width */
            height: auto;
            display: block;
        }
        h1 {
            position: absolute;
            top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-family: sans-serif;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.2rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>Air-ship</h1>

    <div class="art-container">
        <!-- Exact filename from your GitHub upload -->
        <img src="1774453684656.png" alt="Air-ship Illustration">
    </div>

</body>
</html>
